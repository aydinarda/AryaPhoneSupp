<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Final Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        color: #1f2937;
        background: #f3f4f6;
        min-height: 100vh;
        padding: 24px 20px 40px;
      }

      .shell {
        width: min(1200px, 100%);
        margin: 0 auto;
      }

      /* ── top bar ── */
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }

      .topbar-left {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .page-title {
        font-size: 20px;
        font-weight: 700;
        color: #111827;
      }

      .pill {
        padding: 4px 12px;
        border-radius: 999px;
        background: #e5e7eb;
        color: #374151;
        font-size: 13px;
        font-weight: 500;
      }

      .actions { display: flex; gap: 8px; flex-wrap: wrap; }

      button, a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        padding: 0 14px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        text-decoration: none;
        cursor: pointer;
        border: 1px solid transparent;
        transition: background 0.15s;
      }

      .btn-secondary {
        background: #fff;
        color: #374151;
        border-color: #d1d5db;
      }
      .btn-secondary:hover { background: #f9fafb; }

      .btn-primary {
        background: #2563eb;
        color: #fff;
      }
      .btn-primary:hover { background: #1d4ed8; }

      /* ── layout ── */
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .wide { grid-column: 1 / -1; }

      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 20px;
      }

      .card-title {
        font-size: 13px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 14px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      /* ── tables ── */
      .table-wrap { overflow-x: auto; }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 420px;
      }

      th {
        padding: 8px 10px;
        text-align: left;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: #6b7280;
        border-bottom: 1px solid #e5e7eb;
        white-space: nowrap;
      }

      td {
        padding: 10px 10px;
        font-size: 13px;
        color: #1f2937;
        border-bottom: 1px solid #f3f4f6;
      }

      tbody tr:last-child td { border-bottom: none; }

      tbody tr:hover td { background: #f9fafb; }

      td strong { font-weight: 600; }

      .rank { color: #6b7280; font-size: 12px; }

      .empty, .loader, .error {
        min-height: 140px;
        display: grid;
        place-items: center;
        color: #9ca3af;
        font-size: 13px;
      }

      .error { color: #dc2626; }

      @media (max-width: 800px) {
        .grid { grid-template-columns: 1fr; }
        body { padding: 16px 12px 32px; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <div class="topbar-left">
          <span class="page-title">Final Leaderboard</span>
          <span class="pill" id="finishCode">-</span>
        </div>
        <div class="actions">
          <button class="btn-secondary" id="btnRefresh" type="button">Refresh</button>
          <a class="btn-primary" href="/">Back to Lobby</a>
        </div>
      </div>

      <div class="grid">
        <section class="card">
          <div class="card-title">Last Round Results</div>
          <div class="table-wrap" id="lastRoundWrap">
            <div class="loader">Loading…</div>
          </div>
        </section>

        <section class="card">
          <div class="card-title">Cumulative Match Summary</div>
          <div class="table-wrap" id="cumulativeWrap">
            <div class="loader">Loading…</div>
          </div>
        </section>

        <section class="card wide">
          <div class="card-title">Cumulative Leaderboard</div>
          <div class="table-wrap" id="averageWrap">
            <div class="loader">Loading…</div>
          </div>
        </section>
      </div>
    </div>

    <script type="module">
      import { api, fmt } from "/assets/api.js";

      const params = new URLSearchParams(window.location.search);
      const code = (params.get("code") || "").trim().toUpperCase();
      const codeEl = document.getElementById("finishCode");
      const lastRoundWrap = document.getElementById("lastRoundWrap");
      const cumulativeWrap = document.getElementById("cumulativeWrap");
      const averageWrap = document.getElementById("averageWrap");
      const btnRefresh = document.getElementById("btnRefresh");

      if (!code) window.location.replace("/");

      codeEl.textContent = `Session: ${code}`;

      function toAverageRows(rows) {
        return (Array.isArray(rows) ? rows : [])
          .map((row) => {
            const rounds = Number(row.rounds_played ?? 0) || 1;
            return {
              ...row,
              avg_profit: Number(row.total_profit ?? 0) / rounds,
              avg_market_share_pct: Number(row.total_market_share_pct ?? 0) / rounds,
              avg_realized_utility: Number(row.total_realized_utility ?? 0) / rounds,
            };
          })
          .sort((a, b) => Number(b.avg_profit ?? 0) - Number(a.avg_profit ?? 0));
      }

      function empty(target) {
        target.innerHTML = '<div class="empty">No data</div>';
      }

      function renderLastRound(rows) {
        const list = Array.isArray(rows) ? rows : [];
        if (!list.length) { empty(lastRoundWrap); return; }
        const maxRound = Math.max(...list.map((r) => Number(r.round_no ?? 0)));
        const lastRows = list
          .filter((r) => Number(r.round_no ?? 0) === maxRound)
          .sort((a, b) => Number(b.realized_profit ?? 0) - Number(a.realized_profit ?? 0));

        lastRoundWrap.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Round</th><th>#</th><th>Team</th><th>Price</th>
                <th>Demand Share</th><th>Profit</th><th>Market Utility</th>
              </tr>
            </thead>
            <tbody>
              ${lastRows.map((r, i) => `<tr>
                <td>${r.game_round_no ?? r.round_no ?? "-"}</td>
                <td class="rank">${i + 1}</td>
                <td><strong>${r.team ?? "-"}</strong></td>
                <td>${r.price_per_user != null ? `$${Number(r.price_per_user).toFixed(0)}` : "-"}</td>
                <td>${fmt(r.market_share_pct)}%</td>
                <td><strong>${fmt(r.realized_profit)}</strong></td>
                <td>${fmt(r.realized_utility)}</td>
              </tr>`).join("")}
            </tbody>
          </table>`;
      }

      function renderCumulative(rows) {
        const list = toAverageRows(rows);
        if (!list.length) { empty(cumulativeWrap); return; }
        cumulativeWrap.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Team</th><th>Avg Demand Share</th>
                <th>Avg Profit</th><th>Avg Market Utility</th>
              </tr>
            </thead>
            <tbody>
              ${list.map((r) => `<tr>
                <td><strong>${r.team ?? "-"}</strong></td>
                <td>${fmt(r.avg_market_share_pct)}%</td>
                <td><strong>${fmt(r.avg_profit)}</strong></td>
                <td>${fmt(r.avg_realized_utility)}</td>
              </tr>`).join("")}
            </tbody>
          </table>`;
      }

      function renderAverageLeaderboard(rows) {
        const list = toAverageRows(rows);
        if (!list.length) { empty(averageWrap); return; }
        averageWrap.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>#</th><th>Team</th><th>Rounds</th>
                <th>Avg Demand Share</th><th>Avg Profit</th><th>Avg Market Utility</th>
              </tr>
            </thead>
            <tbody>
              ${list.map((r, i) => `<tr>
                <td class="rank">${i + 1}</td>
                <td><strong>${r.team ?? "-"}</strong></td>
                <td>${r.rounds_played ?? 0}</td>
                <td>${fmt(r.avg_market_share_pct)}%</td>
                <td><strong>${fmt(r.avg_profit)}</strong></td>
                <td>${fmt(r.avg_realized_utility)}</td>
              </tr>`).join("")}
            </tbody>
          </table>`;
      }

      async function loadFinalLeaderboard() {
        try {
          const data = await api(`/api/sessions/${code}/leaderboard`);
          renderLastRound(data.turn_leaderboard || []);
          renderCumulative(data.cumulative_leaderboard || []);
          renderAverageLeaderboard(data.cumulative_leaderboard || []);
        } catch (err) {
          const html = `<div class="error">${err?.message || "Could not load leaderboard."}</div>`;
          lastRoundWrap.innerHTML = html;
          cumulativeWrap.innerHTML = html;
          averageWrap.innerHTML = html;
        }
      }

      btnRefresh.addEventListener("click", loadFinalLeaderboard);
      loadFinalLeaderboard();
    </script>
  </body>
</html>
