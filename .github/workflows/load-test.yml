name: Load Test — 50 Users

# Sadece manuel tetiklenir, her deploy'da çalışmaz.
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL"
        required: false
        default: "https://aryaphonesupp.onrender.com"

jobs:
  load-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          curl -L https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-amd64.tar.gz \
            | tar xz --strip-components=1 k6-v0.54.0-linux-amd64/k6
          sudo mv k6 /usr/local/bin/k6
          k6 version

      - name: Wake up Render instance
        run: |
          TARGET="${{ github.event.inputs.target_url }}"
          echo "Waking up ${TARGET} ..."
          for i in $(seq 1 18); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${TARGET}/api/health")
            echo "  [${i}/18] HTTP ${CODE}"
            [ "${CODE}" = "200" ] && echo "Server ready." && break
            sleep 10
          done

      - name: Run load test
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
        run: |
          k6 run \
            --env TARGET_URL="${TARGET_URL}" \
            --out json=results.ndjson \
            .github/scripts/load_test.js
        continue-on-error: true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-run-${{ github.run_number }}
          path: |
            results.ndjson
            summary.html
            summary.json
          retention-days: 30
